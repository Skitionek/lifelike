apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "mycelium.fullname" . }}-api
  labels: {{- include "mycelium.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    matchLabels: {{- include "mycelium.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: {{ .Values.api.strategyType | default "RollingUpdate" }}
  template:
    metadata:
      annotations: {{ toYaml (default dict .Values.api.podAnnotations) | nindent 8 }}
      labels: {{- include "mycelium.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- if .Values.api.podLabels }}
        {{- toYaml .Values.api.podLabels | indent 8 }}
        {{- end }}
    spec:
      {{- include "mycelium.podSpec" .Values.api | nindent 6 }}
      volumes:
        - name: lmdb-storage
          emptyDir: {}
      containers:
        - name: {{ .Chart.Name }}-api
          {{- include "mycelium.image" (dict "image" .Values.api.image "Chart" .Chart) | nindent 10 }}
          {{- include "mycelium.healthChecks" .Values.api | nindent 10 }}
          env: {{ include "mycelium.apiEnv" . | nindent 12 }}
          resources: {{ toYaml (default dict .Values.api.resources) | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          volumeMounts:
            - mountPath: /lmdb
              name: lmdb-storage
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgres
          image: "{{ .Values.api.dbWaiter.image.repository }}:{{ .Values.api.dbWaiter.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" .Values.api.dbWaiter.image.imagePullPolicy }}
          command:
            - /wait-for-it.sh
            - --host={{ template "mycelium.postgresqlHost" . }}
            - --port={{ template "mycelium.postgresqlPort" . }}
            - --timeout={{ default 30 .Values.api.dbWaiter.timeoutSeconds }}
        {{- end }}
        {{- if .Values.neo4j.enabled }}
        - name: wait-for-neo4j
          image: {{ .Values.api.dbWaiter.image.repository }}:{{ .Values.api.dbWaiter.image.tag }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.api.dbWaiter.image.imagePullPolicy }}
          command:
            - /wait-for-it.sh
            - --host={{ template "mycelium.neo4jHost" . }}
            - --port={{ template "mycelium.neo4jPort" . }}
            - --timeout={{ default 30 .Values.api.dbWaiter.timeoutSeconds }}
        {{- end }}
        - name: migrate-db
          {{- include "mycelium.image" (dict "image" .Values.api.image "Chart" .Chart) | nindent 10 }}
          env: {{ include "mycelium.apiEnv" . | nindent 12 }}
          command:
            - bin/migrate-db
            - --upgrade
        {{- if .Values.api.lmdb.loadEnabled }}
        - name: load-lmdb
          {{- include "mycelium.image" (dict "image" .Values.api.image "Chart" .Chart) | nindent 10 }}
          env: {{ include "mycelium.apiEnv" . | nindent 12 }}
          command:
            - flask
            - load-lmdb
          volumeMounts:
            - mountPath: /lmdb
              name: lmdb-storage
        {{- end -}}
