apiVersion: v1
kind: Service
metadata:
  name: {{ include "mycelium.fullname" . }}-api
  labels: {{- include "mycelium.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ default "ClusterIP" .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
      protocol: TCP
      name: http
  selector: {{- include "mycelium.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
