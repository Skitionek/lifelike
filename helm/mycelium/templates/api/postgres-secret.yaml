{{- if not (or .Values.postgresql.enabled .Values.postgresqlExternal.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "mycelium.fullname" . }}
  labels: {{- include "mycelium.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
data:
  postgresql-password: {{ include "mycelium.postgresqlPassword" . | trim | b64enc | quote }}
{{- end -}}
